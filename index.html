<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Dipola FM - Dark Mode</title>
    <style>
        @font-face {
            font-family: 'Ubuntu';
            src: url('Ubuntu_Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Noto Mono';
            src: url('NotoMono-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #b0b0b0;
            --accent-blue: #3498db;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
            --input-bg: #333;
        }

        body {
            font-family: 'Ubuntu', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            border: 1px solid #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 1px;
            color: #fff;
        }

        .control-panel {
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group:last-child { margin-bottom: 0; }

        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        label span {
            color: var(--accent-blue);
            font-weight: bold;
            font-family: 'Noto Mono', monospace;
            font-size: 1.1rem;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--input-bg);
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .result-box {
            background: #2a2a2a;
            padding: 15px 5px;
            border-radius: 10px;
            text-align: center;
            border-top: 2px solid var(--accent-blue);
        }

        .result-box.gap-box { border-top-color: var(--accent-orange); }
        .result-box.imp-box { border-top-color: var(--accent-purple); }

        .result-box span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 5px;
            font-family: 'Ubuntu', sans-serif;
        }

        .result-box strong {
            font-size: 1.1rem;
            color: #fff;
            font-family: 'Noto Mono', monospace;
        }

        .visual-container {
            background: #181818;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #252525;
        }

        .legend {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
            border-left: 3px solid #444;
            padding-left: 15px;
        }

        .legend strong { color: var(--accent-blue); }

        /* Media queries dla responsywności na małych ekranach */
        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            .results {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.5rem;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kalkulator Anteny FM</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Częstotliwość: <span><span id="freq-val">96.0</span> MHz</span></label>
            <input type="range" id="freq" min="87.5" max="108" step="0.1" value="96.0">
        </div>
        <div class="input-group">
            <label>Przerwa (G): <span><span id="gap-val">2.0</span> cm</span></label>
            <input type="range" id="gap" min="0.5" max="5" step="0.1" value="2.0">
        </div>
    </div>

    <div class="results">
        <div class="result-box">
            <span>Długość (L)</span>
            <strong id="total-len">-</strong>
        </div>
        <div class="result-box gap-box">
            <span>Przerwa (G)</span>
            <strong id="res-gap">-</strong>
        </div>
        <div class="result-box">
            <span>Ramię (A)</span>
            <strong id="arm-len">-</strong>
        </div>
        <div class="result-box imp-box">
            <span>Impedancja (Z)</span>
            <strong id="impedance">-</strong>
        </div>
    </div>

    <div class="visual-container">
        <svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
            <line x1="40" y1="90" x2="192" y2="90" stroke="#ecf0f1" stroke-width="8" stroke-linecap="round" />
            <line x1="208" y1="90" x2="360" y2="90" stroke="#ecf0f1" stroke-width="8" stroke-linecap="round" />
            
            <path d="M192 90 Q192 140 170 160" fill="none" stroke="#555" stroke-width="3" />
            <path d="M208 90 Q208 140 230 160" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="4" />
            
            <text x="115" y="75" font-family="'Noto Mono', monospace" font-size="11" fill="#bbb" text-anchor="middle" id="svg-arm-1">A</text>
            <text x="285" y="75" font-family="'Noto Mono', monospace" font-size="11" fill="#bbb" text-anchor="middle" id="svg-arm-2">A</text>
            
            <line x1="192" y1="105" x2="208" y2="105" stroke="var(--accent-orange)" stroke-width="2" />
            <text x="200" y="122" font-family="'Noto Mono', monospace" font-size="11" font-weight="bold" fill="var(--accent-orange)" text-anchor="middle" id="svg-gap">G</text>
            
            <line x1="40" y1="45" x2="360" y2="45" stroke="var(--accent-blue)" stroke-width="1" />
            <text x="200" y="35" font-family="'Noto Mono', monospace" font-size="12" font-weight="bold" fill="var(--accent-blue)" text-anchor="middle" id="svg-total">L</text>
        </svg>
    </div>

    <div class="legend">
        <strong>Montaż:</strong> Rozsuń oba teleskopy na długość <strong>A</strong>. Zachowaj przerwę <strong>G</strong> pomiędzy ich podstawami. Całkowita rozpiętość anteny wyniesie <strong>L</strong>.
    </div>
</div>

<script>
    const freqIn = document.getElementById('freq');
    const gapIn = document.getElementById('gap');
    
    function update() {
        const f = parseFloat(freqIn.value);
        const g = parseFloat(gapIn.value);
        
        document.getElementById('freq-val').textContent = f.toFixed(1);
        document.getElementById('gap-val').textContent = g.toFixed(1);
        
        // Współczynnik skrócenia k=0.95: 142.5 / f
        const totalCm = (142.5 / f) * 100;
        const armCm = (totalCm - g) / 2;

        document.getElementById('total-len').textContent = totalCm.toFixed(1) + " cm";
        document.getElementById('res-gap').textContent = g.toFixed(1) + " cm";
        document.getElementById('arm-len').textContent = armCm.toFixed(1) + " cm";
        
        // Rezonansowy dipol w wolnej przestrzeni ma stałą impedancję ok. 73 Ohm
        document.getElementById('impedance').textContent = "~73 Ω";
        
        document.getElementById('svg-arm-1').textContent = armCm.toFixed(1) + " cm";
        document.getElementById('svg-arm-2').textContent = armCm.toFixed(1) + " cm";
        document.getElementById('svg-gap').textContent = g.toFixed(1) + " cm";
        document.getElementById('svg-total').textContent = "L = " + totalCm.toFixed(1) + " cm";
    }

    freqIn.addEventListener('input', update);
    gapIn.addEventListener('input', update);
    update();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>HITS FM - Odsłuchane</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; }
        .track { font-size: 20px; color: #38bdf8; text-align: center; margin: 15px 0; font-weight: bold; }
        .play-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #38bdf8; cursor: pointer; font-weight: bold; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 14px; }
        td { padding: 8px; border-bottom: 1px solid #334155; }
        .time { color: #38bdf8; width: 80px; }
        .error { color: #f87171; text-align: center; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center; font-size: 12px; color: #94a3b8;">TERAZ GRAMY:</div>
    <div class="track" id="currentTrack">Ładowanie...</div>
    
    <button class="play-btn" onclick="toggleAudio()" id="pBtn">URUCHOM RADIO</button>
    
    <table>
        <tbody id="historyList"></tbody>
    </table>
    <div id="status" class="error"></div>
</div>

<audio id="audio" src="http://82.145.41.8:33745/stream"></audio>

<script>
    const audio = document.getElementById('audio');
    
    function toggleAudio() {
        const btn = document.getElementById('pBtn');
        if (audio.paused) {
            audio.play();
            btn.textContent = "STOP";
            btn.style.background = "#f87171";
        } else {
            audio.pause();
            btn.textContent = "URUCHOM RADIO";
            btn.style.background = "#38bdf8";
        }
    }

    async function refresh() {
        try {
            // Używamy względnej ścieżki - index i api muszą być w tym samym folderze!
            const r = await fetch('api.php');
            if (!r.ok) throw new Error("Plik api.php nie odpowiada");
            const d = await r.json();
            
            document.getElementById('currentTrack').textContent = d.current;
            
            let h = "";
            d.history.forEach(i => {
                h += `<tr><td class="time">${i.time}</td><td>${i.title}</td></tr>`;
            });
            document.getElementById('historyList').innerHTML = h;
            document.getElementById('status').textContent = "";
        } catch (e) {
            document.getElementById('status').textContent = "Błąd API: " + e.message;
        }
    }

    setInterval(refresh, 10000);
    refresh();
</script>
</body>
</html>

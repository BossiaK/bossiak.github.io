<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>HITS FM - Radio Szpieg</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .card { max-width: 800px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Odtwarzacz */
        .player-ui { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        #track-title { font-size: 24px; font-weight: bold; color: #38bdf8; display: block; margin: 15px 0; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .play-btn { background: #38bdf8; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        /* Głośność */
        .volume-box { display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 14px; }
        input[type=range] { cursor: pointer; accent-color: #38bdf8; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #94a3b8; font-size: 12px; border-bottom: 2px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        .time-col { color: #38bdf8; font-family: monospace; width: 160px; }

        .status-msg { font-size: 11px; color: #475569; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="player-ui">
        <small style="letter-spacing: 2px; color: #64748b;">HITS FM LIVE</small>
        <span id="track-title">Inicjalizacja szpiega...</span>
        
        <div class="controls">
            <button class="play-btn" onclick="togglePlay()" id="playBtn">GRAJ</button>
            
            <div class="volume-box">
                <span>Głośność:</span>
                <input type="range" id="volRange" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
                <span id="volLabel">80%</span>
            </div>
        </div>
    </div>

    <h3>Ostatnio grane</h3>
    <div style="max-height: 400px; overflow-y: auto;">
        <table>
            <thead>
                <tr>
                    <th>Data i Godzina</th>
                    <th>Utwór</th>
                </tr>
            </thead>
            <tbody id="history-log"></tbody>
        </table>
    </div>
    
    <div class="status-msg" id="debug">Status: Oczekiwanie...</div>
</div>

<audio id="radio" src="http://82.145.41.8:33745/stream" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('radio');
    const playBtn = document.getElementById('playBtn');
    const trackTitle = document.getElementById('track-title');
    const historyLog = document.getElementById('history-log');
    const debug = document.getElementById('debug');

    // Obsługa głośności
    function setVolume(val) {
        audio.volume = val;
        document.getElementById('volLabel').textContent = Math.round(val * 100) + "%";
    }

    // Obsługa odtwarzania
    function togglePlay() {
        if (audio.paused) {
            audio.load();
            audio.play();
            playBtn.textContent = "STOP";
            playBtn.style.background = "#f43f5e";
        } else {
            audio.pause();
            playBtn.textContent = "GRAJ";
            playBtn.style.background = "#38bdf8";
        }
    }

    // Synchronizacja danych z serwerem
    async function updateData() {
        try {
            const res = await fetch('api.php?cache_buster=' + Date.now());
            const data = await res.json();

            trackTitle.textContent = data.current;
            debug.textContent = "Status: " + data.debug_status;

            // Budowanie tabeli historii
            let rows = "";
            if (data.history && data.history.length > 0) {
                data.history.forEach(item => {
                    rows += `<tr>
                        <td class="time-col">${item.date} ${item.time}</td>
                        <td>${item.title}</td>
                    </tr>`;
                });
            } else {
                rows = "<tr><td colspan='2'>Brak utworów w bazie (czekam na zmianę piosenki)</td></tr>";
            }
            historyLog.innerHTML = rows;

        } catch (e) {
            debug.textContent = "Błąd: Brak połączenia z plikiem api.php";
        }
    }

    // Interwał 10 sekund
    setInterval(updateData, 10000);
    updateData(); // Pierwszy start
</script>

</body>
</html>
